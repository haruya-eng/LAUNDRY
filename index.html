<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>コインランドリー 修理状況</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans','Meiryo',sans-serif;font-size:15px;color:#1a1a1a;background:#f5f4f0}
.app{max-width:960px;margin:0 auto;padding:1.25rem 1rem}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 0 1rem;border-bottom:1px solid #e0ddd6;margin-bottom:1.25rem;flex-wrap:wrap;gap:8px}
.logo{font-size:16px;font-weight:600;letter-spacing:.02em}
.topbar-btns{display:flex;gap:8px}
.add-btn{padding:6px 16px;font-size:13px;border:1px solid #c8c5bc;border-radius:8px;cursor:pointer;background:#fff;color:#1a1a1a;transition:background .15s}
.add-btn:hover{background:#f0ede8}
.print-btn{padding:6px 16px;font-size:13px;border:1px solid #c8c5bc;border-radius:8px;cursor:pointer;background:#fff;color:#1a1a1a;transition:background .15s}
.print-btn:hover{background:#f0ede8}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.25rem}
.stat{background:#fff;border-radius:10px;padding:.8rem 1rem;border:1px solid #e8e5de}
.stat-label{font-size:12px;color:#888;margin-bottom:3px}
.stat-num{font-size:22px;font-weight:600}
.store-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1rem}
.stab{padding:4px 12px;font-size:12px;border:1px solid #ddd;border-radius:99px;cursor:pointer;background:#fff;color:#666;white-space:nowrap;transition:all .15s}
.stab.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.search-bar{display:flex;gap:8px;margin-bottom:1rem}
.search-bar input{flex:1;padding:7px 12px;font-size:13px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#1a1a1a}
.search-bar select{padding:7px 10px;font-size:13px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#1a1a1a}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
.section-title{font-size:13px;font-weight:500;color:#888}
.tickets{display:flex;flex-direction:column;gap:8px}
.ticket{background:#fff;border:1px solid #e8e5de;border-radius:12px;padding:.9rem 1.1rem;cursor:pointer;transition:border-color .15s,box-shadow .15s}
.ticket:hover{border-color:#bbb;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.ticket-top{display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap}
.machine-id{font-weight:600;font-size:14px}
.store-tag{font-size:11px;padding:2px 8px;background:#f0ede8;border-radius:99px;color:#666}
.badge{font-size:11px;font-weight:600;padding:2px 9px;border-radius:99px}
.b-new{background:#FEF3C7;color:#92400E}
.b-progress{background:#DBEAFE;color:#1E40AF}
.b-done{background:#D1FAE5;color:#065F46}
.b-waiting{background:#FCE7F3;color:#831843}
.ticket-desc{font-size:13px;color:#555;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ticket-notice{font-size:12px;color:#1E40AF;margin-bottom:3px}
.ticket-meta{display:flex;gap:12px;font-size:12px;color:#aaa;flex-wrap:wrap}
.detail-panel{display:none;position:fixed;top:0;right:0;width:380px;height:100%;background:#fff;border-left:1px solid #e0ddd6;z-index:100;overflow-y:auto;padding:1.25rem;box-shadow:-4px 0 20px rgba(0,0,0,.08)}
.detail-panel.open{display:block}
.panel-close{float:right;background:none;border:none;font-size:20px;cursor:pointer;color:#aaa;line-height:1}
.panel-title{font-size:15px;font-weight:600;margin-bottom:1.1rem;padding-right:24px;line-height:1.4}
.dl{display:grid;grid-template-columns:auto 1fr;gap:5px 12px;margin-bottom:1rem}
.dt{font-size:13px;color:#888}
.dd{font-size:13px;font-weight:500}
.form-label{display:block;font-size:12px;color:#888;margin-bottom:3px}
.status-select,.notice-ta,.date-input{width:100%;padding:7px 10px;font-size:13px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#1a1a1a;margin-bottom:.75rem}
.notice-ta{min-height:56px;resize:vertical;font-family:inherit}
.save-btn{padding:5px 14px;font-size:12px;border:1px solid #ddd;border-radius:6px;background:#fff;cursor:pointer;margin-bottom:.85rem;display:block}
.save-btn:hover{background:#f5f4f0}
.panel-sep{font-size:12px;font-weight:500;color:#aaa;padding:6px 0 5px;margin-top:.5rem;border-top:1px solid #f0ede8}
.comment-list{margin-bottom:.75rem}
.comment{background:#f9f8f5;border-radius:8px;padding:.55rem .75rem;margin-bottom:5px;font-size:13px}
.comment-meta{font-size:11px;color:#bbb;margin-top:2px}
.comment-form{display:flex;gap:6px}
.comment-form input{flex:1;font-size:13px;padding:7px 10px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#1a1a1a}
.comment-form button{padding:6px 14px;font-size:13px;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:99}
.overlay.open{display:block}
.modal{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;border:1px solid #ddd;border-radius:14px;padding:1.5rem;width:360px;z-index:101;max-height:92vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.12)}
.modal.open{display:block}
.modal h3{font-size:15px;font-weight:600;margin-bottom:1rem}
.form-row{margin-bottom:.75rem}
.form-row label{display:block;font-size:12px;color:#888;margin-bottom:3px}
.form-row input,.form-row select,.form-row textarea{width:100%;padding:7px 10px;font-size:13px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#1a1a1a;font-family:inherit}
.form-row textarea{min-height:60px;resize:vertical}
.date-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:.75rem}
.date-row .form-row{margin-bottom:0}
.modal-btns{display:flex;justify-content:flex-end;gap:8px;margin-top:1rem}
.modal-btns button{padding:7px 18px;font-size:13px;border:1px solid #ddd;border-radius:8px;cursor:pointer;background:#fff}
.modal-btns .primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.empty{text-align:center;padding:2.5rem;color:#bbb;font-size:13px}
.loading{text-align:center;padding:2rem;color:#aaa;font-size:13px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;display:inline-block;margin-right:5px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* 印刷モーダル */
.print-modal{display:none;position:fixed;inset:0;background:#fff;z-index:200;overflow-y:auto;padding:2rem}
.print-modal.open{display:block}
.print-modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;border-bottom:1px solid #ddd;padding-bottom:1rem}
.print-modal-head h2{font-size:18px;font-weight:600}
.print-modal-btns{display:flex;gap:8px}
.print-filter{display:flex;gap:8px;margin-bottom:1.5rem;flex-wrap:wrap}
.print-filter select,.print-filter input{padding:6px 10px;font-size:13px;border:1px solid #ddd;border-radius:8px;background:#fff}

/* 印刷テーブル */
.print-table{width:100%;border-collapse:collapse;font-size:13px}
.print-table th{background:#f5f4f0;padding:8px 10px;text-align:left;border:1px solid #ddd;font-weight:600;white-space:nowrap}
.print-table td{padding:8px 10px;border:1px solid #ddd;vertical-align:top}
.print-table tr:nth-child(even){background:#fafaf8}
.print-comments{font-size:12px;color:#555}
.print-comment-item{margin-bottom:3px;padding-bottom:3px;border-bottom:1px solid #eee}
.print-comment-item:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}

@media print {
  .print-modal-head{display:none}
  .print-filter{display:none}
  body{background:#fff}
  .print-modal{padding:.5rem}
  .print-table{font-size:11px}
  .print-table th,.print-table td{padding:5px 7px}
}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <span class="logo"><span class="sync-dot"></span>コインランドリー 修理状況</span>
    <div class="topbar-btns">
      <button class="print-btn" onclick="openPrint()">🖨 印刷・資料</button>
      <button class="add-btn" onclick="openModal()">+ 新規登録</button>
    </div>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-label">受付中</div><div class="stat-num" id="cnt-new" style="color:#D97706">0</div></div>
    <div class="stat"><div class="stat-label">対応中</div><div class="stat-num" id="cnt-prog" style="color:#2563EB">0</div></div>
    <div class="stat"><div class="stat-label">部品待ち</div><div class="stat-num" id="cnt-wait" style="color:#9D174D">0</div></div>
    <div class="stat"><div class="stat-label">完了</div><div class="stat-num" id="cnt-done" style="color:#059669">0</div></div>
  </div>
  <div class="store-tabs" id="store-tabs"></div>
  <div class="search-bar">
    <input type="text" id="search-text" placeholder="機械番号・症状・店舗名で検索..." oninput="renderList()">
    <select id="search-status" onchange="renderList()">
      <option value="">すべてのステータス</option>
      <option value="受付中">受付中</option>
      <option value="対応中">対応中</option>
      <option value="部品待ち">部品待ち</option>
      <option value="完了">完了</option>
    </select>
  </div>
  <div class="section-head">
    <span class="section-title" id="list-label">全店舗 — 修理チケット一覧</span>
  </div>
  <div class="tickets" id="ticket-list"><div class="loading">読み込み中...</div></div>
</div>

<div class="overlay" id="overlay" onclick="closeAll()"></div>

<div class="detail-panel" id="detail-panel">
  <button class="panel-close" onclick="closeAll()">×</button>
  <div class="panel-title" id="panel-title"></div>
  <div id="panel-body"></div>
</div>

<div class="modal" id="add-modal">
  <h3>新規修理チケット登録</h3>
  <div class="form-row"><label>店舗</label><select id="f-store"></select></div>
  <div class="form-row"><label>機械番号（不明な場合は空欄可）</label><input id="f-mid" placeholder="例: W-03, D-01（不明な場合は空欄可）"></div>
  <div class="form-row"><label>機械種別</label>
    <select id="f-type"><option>洗濯機</option><option>乾燥機</option><option>洗濯乾燥機</option><option>スニーカーランドリー</option><option>両替機</option><option>その他</option></select>
  </div>
  <div class="form-row"><label>故障・症状</label><textarea id="f-desc" placeholder="例: 扉が開かない、エラーコードE3が表示"></textarea></div>
  <div class="date-row">
    <div class="form-row"><label>受付日/発生日</label><input type="date" id="f-received"></div>
    <div class="form-row"><label>作業予定日</label><input type="date" id="f-scheduled"></div>
  </div>
  <div class="form-row"><label>お知らせ・コメント（省略可）</label><textarea id="f-notice" placeholder="例: 現在修理対応中です。ご不便をおかけして申し訳ありません。"></textarea></div>
  <div class="modal-btns">
    <button onclick="closeModal()">キャンセル</button>
    <button class="primary" onclick="addTicket()">登録</button>
  </div>
</div>

<!-- 印刷モーダル -->
<div class="print-modal" id="print-modal">
  <div class="print-modal-head">
    <h2>🖨 印刷・作業履歴資料</h2>
    <div class="print-modal-btns">
      <button class="add-btn" onclick="window.print()">印刷 / PDF保存</button>
      <button class="add-btn" onclick="downloadCSV()">📥 CSV出力（Excel用）</button>
      <button class="add-btn" onclick="closePrint()">閉じる</button>
    </div>
  </div>
  <div class="print-filter">
    <select id="p-store" onchange="renderPrint()">
      <option value="">全店舗</option>
    </select>
    <select id="p-status" onchange="renderPrint()">
      <option value="">すべてのステータス</option>
      <option value="受付中">受付中</option>
      <option value="対応中">対応中</option>
      <option value="部品待ち">部品待ち</option>
      <option value="完了">完了</option>
    </select>
    <input type="date" id="p-from" onchange="renderPrint()" placeholder="開始日">
    <input type="date" id="p-to" onchange="renderPrint()" placeholder="終了日">
  </div>
  <div id="print-body"></div>
</div>

<script>
const SUPABASE_URL = 'https://qokifxfhtddkubqwxcpw.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFva2lmeGZodGRka3VicXd4Y3B3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwOTczMjksImV4cCI6MjA5MjY3MzMyOX0.Q_2gIjt3D9fwTUC-hThS16Np0EyQeWpVQDwZyFickZ8';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const STORES = [
  'えのくま店','湯布院店','志手店','柳ヶ浦店',
  '豊後高田店','四日市店','なかどの店','古国府店',
  '高城店','城野店','下郡店','西大分店',
  '大在北店','市浜店','法鏡寺店','城井店'
];
const STATUSES = ['受付中','対応中','部品待ち','完了'];
const BADGE_CLS = {受付中:'b-new',対応中:'b-progress',部品待ち:'b-waiting',完了:'b-done'};

let tickets = [];
let selectedStore = '';

async function loadTickets() {
  const { data, error } = await sb.from('tickets').select('*').order('received_date', { ascending: false });
  if (error) { console.error(error); return; }
  tickets = data || [];
  renderStoreTabs();
  renderList();
}

sb.channel('tickets-changes')
  .on('postgres_changes', { event: '*', schema: 'public', table: 'tickets' }, () => { loadTickets(); })
  .subscribe();

function renderStoreTabs() {
  document.getElementById('store-tabs').innerHTML =
    `<button class="stab ${selectedStore===''?'active':''}" onclick="setStore('')">全店舗</button>`
    + STORES.map(s => {
      const cnt = tickets.filter(t => t.store === s && t.status !== '完了').length;
      return `<button class="stab ${selectedStore===s?'active':''}" onclick="setStore('${s}')">${s}${cnt>0?` (${cnt})`:''}</button>`;
    }).join('');
}

function setStore(s) { selectedStore = s; renderStoreTabs(); renderList(); }

function renderStats() {
  const src = selectedStore ? tickets.filter(t => t.store === selectedStore) : tickets;
  document.getElementById('cnt-new').textContent = src.filter(t => t.status==='受付中').length;
  document.getElementById('cnt-prog').textContent = src.filter(t => t.status==='対応中').length;
  document.getElementById('cnt-wait').textContent = src.filter(t => t.status==='部品待ち').length;
  document.getElementById('cnt-done').textContent = src.filter(t => t.status==='完了').length;
}

function renderList() {
  const q = document.getElementById('search-text').value.toLowerCase();
  const st = document.getElementById('search-status').value;
  document.getElementById('list-label').textContent = (selectedStore || '全店舗') + ' — 修理チケット一覧';
  const filtered = tickets.filter(t => {
    const mS = !selectedStore || t.store === selectedStore;
    const mQ = !q || (t.mid||'').toLowerCase().includes(q) || (t.description||'').toLowerCase().includes(q) || (t.store||'').toLowerCase().includes(q);
    const mSt = !st || t.status === st;
    return mS && mQ && mSt;
  });
  const el = document.getElementById('ticket-list');
  if (!filtered.length) { el.innerHTML = '<div class="empty">該当するチケットがありません</div>'; renderStats(); return; }
  el.innerHTML = filtered.map(t => `
    <div class="ticket" onclick="openDetail('${t.id}')">
      <div class="ticket-top">
        <span class="machine-id">${t.mid||'番号未定'}</span>
        <span class="badge ${BADGE_CLS[t.status]||''}">${t.status||''}</span>
        <span class="store-tag">${t.store||''}</span>
        <span style="font-size:12px;color:#aaa">${t.mid_type||''}</span>
      </div>
      <div class="ticket-desc">${t.description||''}</div>
      ${t.notice ? `<div class="ticket-notice">📢 ${t.notice}</div>` : ''}
      <div class="ticket-meta">
        <span>受付/発生: ${t.received_date||'—'}</span>
        <span>予定: ${t.scheduled_date||'—'}</span>
        ${t.completed_date ? `<span style="color:#059669">完了: ${t.completed_date}</span>` : ''}
        <span>コメント ${(t.comments||[]).length}件</span>
      </div>
    </div>`).join('');
  renderStats();
}

function openDetail(id) {
  const t = tickets.find(x => x.id === id); if (!t) return;
  document.getElementById('panel-title').textContent = `${t.store} ／ ${t.mid||'番号未定'} (${t.mid_type})`;
  const comments = t.comments || [];
  document.getElementById('panel-body').innerHTML = `
    <dl class="dl">
      <dt class="dt">チケットID</dt><dd class="dd">${t.id}</dd>
      <dt class="dt">症状</dt><dd class="dd">${t.description||''}</dd>
    </dl>
    <label class="form-label">ステータス変更</label>
    <select class="status-select" onchange="changeStatus('${t.id}',this.value)">
      ${STATUSES.map(s=>`<option ${s===t.status?'selected':''}>${s}</option>`).join('')}
    </select>
    <label class="form-label">機械番号</label>
    <input class="date-input" id="d-mid" value="${t.mid||''}" placeholder="番号がわかったら入力">
    <label class="form-label">受付日/発生日</label>
    <input type="date" class="date-input" id="d-received" value="${t.received_date||''}">
    <label class="form-label">作業予定日</label>
    <input type="date" class="date-input" id="d-scheduled" value="${t.scheduled_date||''}">
    <label class="form-label">完了日</label>
    <input type="date" class="date-input" id="d-completed" value="${t.completed_date||''}">
    <button class="save-btn" onclick="saveDates('${t.id}')">保存</button>
    <label class="form-label">お知らせ・コメント</label>
    <textarea class="notice-ta" id="notice-text">${t.notice||''}</textarea>
    <button class="save-btn" onclick="saveNotice('${t.id}')">お知らせを保存</button>
    <div class="panel-sep">作業コメント履歴</div>
    <div class="comment-list" id="comment-list-${t.id}">
      ${comments.map(c=>`<div class="comment">${c.text}<div class="comment-meta">${c.author} ・ ${c.time}</div></div>`).join('') || '<div style="font-size:13px;color:#ccc;padding:.2rem 0">コメントなし</div>'}
    </div>
    <div class="comment-form">
      <input type="text" id="comment-input" placeholder="作業内容・メモを追加...">
      <button onclick="addComment('${t.id}')">送信</button>
    </div>`;
  document.getElementById('detail-panel').classList.add('open');
  document.getElementById('overlay').classList.add('open');
}

async function changeStatus(id, val) {
  const updates = { status: val };
  if (val === '完了') {
    const t = tickets.find(x => x.id === id);
    if (!t.completed_date) updates.completed_date = new Date().toISOString().slice(0, 10);
  }
  await sb.from('tickets').update(updates).eq('id', id);
}

async function saveDates(id) {
  const mid = document.getElementById('d-mid').value.trim() || null;
  const received_date = document.getElementById('d-received').value || null;
  const scheduled_date = document.getElementById('d-scheduled').value || null;
  const completed_date = document.getElementById('d-completed').value || null;
  const { error } = await sb.from('tickets').update({ mid, received_date, scheduled_date, completed_date }).eq('id', id);
  if (error) { alert('保存に失敗しました: ' + error.message); return; }
  alert('保存しました');
}

async function saveNotice(id) {
  const notice = document.getElementById('notice-text').value;
  await sb.from('tickets').update({ notice }).eq('id', id);
  alert('お知らせを保存しました');
}

async function addComment(id) {
  const inp = document.getElementById('comment-input');
  const text = inp.value.trim(); if (!text) return;
  const t = tickets.find(x => x.id === id);
  const now = new Date();
  const time = `${(now.getMonth()+1).toString().padStart(2,'0')}/${now.getDate().toString().padStart(2,'0')} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
  const comments = [...(t.comments||[]), { text, author:'スタッフ', time }];
  await sb.from('tickets').update({ comments }).eq('id', id);
  inp.value = '';
}

function openModal() {
  const today = new Date().toISOString().slice(0, 10);
  document.getElementById('f-store').innerHTML = STORES.map(s => `<option ${s===selectedStore?'selected':''}>${s}</option>`).join('');
  document.getElementById('f-received').value = today;
  document.getElementById('f-scheduled').value = '';
  document.getElementById('add-modal').classList.add('open');
  document.getElementById('overlay').classList.add('open');
}
function closeModal() {
  document.getElementById('add-modal').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

async function addTicket() {
  const store = document.getElementById('f-store').value;
  const mid = document.getElementById('f-mid').value.trim() || null;
  const mid_type = document.getElementById('f-type').value;
  const description = document.getElementById('f-desc').value.trim();
  const received_date = document.getElementById('f-received').value || null;
  const scheduled_date = document.getElementById('f-scheduled').value || null;
  const notice = document.getElementById('f-notice').value.trim();
  if (!description) { alert('故障内容は必須です'); return; }
  const id = 'T' + Date.now();
  const { error } = await sb.from('tickets').insert([{
    id, store, mid, mid_type, description,
    status: '受付中', received_date, scheduled_date,
    completed_date: null, notice, comments: []
  }]);
  if (error) { alert('登録に失敗しました: ' + error.message); return; }
  closeModal();
  ['f-mid','f-desc','f-notice'].forEach(i => document.getElementById(i).value = '');
}

function closeAll() {
  document.getElementById('detail-panel').classList.remove('open');
  document.getElementById('add-modal').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

// 印刷機能
function openPrint() {
  const sel = document.getElementById('p-store');
  sel.innerHTML = '<option value="">全店舗</option>' + STORES.map(s => `<option>${s}</option>`).join('');
  renderPrint();
  document.getElementById('print-modal').classList.add('open');
}

function closePrint() {
  document.getElementById('print-modal').classList.remove('open');
}

function renderPrint() {
  const store = document.getElementById('p-store').value;
  const status = document.getElementById('p-status').value;
  const from = document.getElementById('p-from').value;
  const to = document.getElementById('p-to').value;

  let filtered = tickets.filter(t => {
    const mS = !store || t.store === store;
    const mSt = !status || t.status === status;
    const mF = !from || (t.received_date && t.received_date >= from);
    const mT = !to || (t.received_date && t.received_date <= to);
    return mS && mSt && mF && mT;
  });

  const now = new Date();
  const dateStr = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`;

  let html = `
    <div style="margin-bottom:1rem;font-size:13px;color:#888">
      出力日: ${dateStr}　件数: ${filtered.length}件
    </div>
    <table class="print-table">
      <thead>
        <tr>
          <th>店舗</th>
          <th>機械番号</th>
          <th>種別</th>
          <th>故障・症状</th>
          <th>ステータス</th>
          <th>受付/発生日</th>
          <th>作業予定日</th>
          <th>完了日</th>
          <th>お知らせ</th>
          <th>作業コメント履歴</th>
        </tr>
      </thead>
      <tbody>
        ${filtered.map(t => {
          const comments = (t.comments||[]).map(c =>
            `<div class="print-comment-item">${c.text}<span style="color:#bbb;margin-left:6px">${c.author} ${c.time}</span></div>`
          ).join('');
          return `
            <tr>
              <td>${t.store||''}</td>
              <td>${t.mid||'未定'}</td>
              <td>${t.mid_type||''}</td>
              <td>${t.description||''}</td>
              <td>${t.status||''}</td>
              <td>${t.received_date||'—'}</td>
              <td>${t.scheduled_date||'—'}</td>
              <td>${t.completed_date||'—'}</td>
              <td>${t.notice||''}</td>
              <td class="print-comments">${comments||'なし'}</td>
            </tr>`;
        }).join('')}
      </tbody>
    </table>`;

  document.getElementById('print-body').innerHTML = html;
}

loadTickets();

function downloadCSV() {
  const store = document.getElementById('p-store').value;
  const status = document.getElementById('p-status').value;
  const from = document.getElementById('p-from').value;
  const to = document.getElementById('p-to').value;
  let filtered = tickets.filter(t => {
    const mS = !store || t.store === store;
    const mSt = !status || t.status === status;
    const mF = !from || (t.received_date && t.received_date >= from);
    const mT = !to || (t.received_date && t.received_date <= to);
    return mS && mSt && mF && mT;
  });
  const headers = ['店舗','機械番号','種別','故障・症状','ステータス','受付/発生日','作業予定日','完了日','お知らせ','作業コメント履歴'];
  const rows = filtered.map(t => {
    const comments = (t.comments||[]).map(c => c.text + '(' + c.author + ' ' + c.time + ')').join(' / ');
    return [
      t.store||'',
      t.mid||'未定',
      t.mid_type||'',
      t.description||'',
      t.status||'',
      t.received_date||'',
      t.scheduled_date||'',
      t.completed_date||'',
      t.notice||'',
      comments
    ].map(v => '"' + String(v).replace(/"/g, '""') + '"');
  });
  const bom = '\uFEFF';
  const csv = bom + [headers.map(h => '"' + h + '"'), ...rows].map(r => r.join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const now = new Date();
  const fname = '修理履歴_' + now.getFullYear() + String(now.getMonth()+1).padStart(2,'0') + String(now.getDate()).padStart(2,'0') + '.csv';
  a.href = url; a.download = fname; a.click();
  URL.revokeObjectURL(url);
}
